<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jingchao Wang</title>
  <meta
    name="description"
    content="Jingchao Wang is a PhD student at the School of Computer Science, Peking University, working on AI for Science, Embodied AI, Multimodal Learning, World Models, and Multi-agent systems."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-glow page-glow-left" aria-hidden="true"></div>
  <div class="page-glow page-glow-right" aria-hidden="true"></div>

  <header class="site-header" id="site-header">
    <div class="container header-inner">
      <a class="brand" href="#top">
        <span class="brand-title">Jingchao Wang</span>
        <span class="brand-sub" id="brand-sub">PKU CS</span>
      </a>

      <button class="menu-toggle" id="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        Menu
      </button>

      <div class="header-controls">
        <nav class="site-nav" id="site-nav">
          <a href="#about" id="nav-about">About</a>
          <a href="#agenda" id="nav-agenda">Research</a>
          <a href="#publications" id="nav-publications">Publications</a>
          <a href="#project" id="nav-project">Project</a>
          <a href="#contact" id="nav-contact">Contact</a>
        </nav>

        <div class="lang-toggle" role="group" aria-label="Language switcher">
          <button class="lang-button is-active" data-lang="en" type="button">EN</button>
          <button class="lang-button" data-lang="zh" type="button">中文</button>
        </div>
      </div>
    </div>
  </header>

  <main id="top">
    <section class="section hero">
      <div class="container hero-grid">
        <div class="hero-main reveal">
          <p class="hero-kicker" id="hero-kicker"></p>
          <h1 class="hero-name" id="hero-name"></h1>
          <p class="hero-alt-name" id="hero-alt-name"></p>
          <p class="hero-role" id="hero-role"></p>
          <p class="hero-summary" id="hero-summary"></p>

          <div class="hero-actions">
            <a
              class="button button-primary"
              href="https://scholar.google.com/citations?hl=zh-CN&user=1ol5tV0AAAAJ&view_op=list_works&gmla=AEk_c1uRq2LuolxdTZOrfVBk7rrlO8SLX-Eu4osPZEon2yJcoaS6mlrpfASIWvXm2TZ8RxaX7uBr6lTcvpyTKvgpiFnAjUYxXEPoPBOdv-s"
              target="_blank"
              rel="noreferrer"
              id="hero-scholar-link"
            ></a>
            <a
              class="button button-secondary"
              href="https://github.com/jikjn"
              target="_blank"
              rel="noreferrer"
              id="hero-github-link"
            ></a>
            <a
              class="button button-secondary"
              href="mailto:ethanwangjc@163.com"
              id="hero-email-link"
            ></a>
          </div>
        </div>

        <aside class="hero-side reveal reveal-delay-1">
          <div class="portrait-card">
            <img src="assets/avatar.jpg" alt="Portrait of Jingchao Wang">
          </div>

          <div class="profile-card">
            <p class="card-kicker" id="profile-kicker"></p>
            <dl class="fact-grid" id="fact-grid"></dl>
          </div>
        </aside>
      </div>
    </section>

    <section class="section" id="about">
      <div class="container">
        <div class="section-heading reveal">
          <p class="section-kicker" id="about-kicker"></p>
          <h2 id="about-title"></h2>
          <p class="section-lead" id="about-lead"></p>
        </div>

        <div class="about-grid">
          <div class="about-copy reveal reveal-delay-1" id="about-copy"></div>

          <aside class="interest-card reveal reveal-delay-2">
            <p class="card-kicker" id="interest-kicker"></p>
            <div class="interest-list" id="interest-list"></div>
            <div class="interest-divider"></div>
            <p class="interest-note" id="interest-note"></p>
          </aside>
        </div>
      </div>
    </section>

    <section class="section" id="agenda">
      <div class="container">
        <div class="section-heading reveal">
          <p class="section-kicker" id="agenda-kicker"></p>
          <h2 id="agenda-title"></h2>
          <p class="section-lead" id="agenda-lead"></p>
        </div>

        <div class="agenda-grid" id="agenda-list"></div>
      </div>
    </section>

    <section class="section" id="publications">
      <div class="container">
        <div class="section-heading section-heading-split reveal">
          <div>
            <p class="section-kicker" id="publications-kicker"></p>
            <h2 id="publications-title"></h2>
          </div>
          <a
            class="section-link"
            href="https://scholar.google.com/citations?hl=zh-CN&user=1ol5tV0AAAAJ&view_op=list_works&gmla=AEk_c1uRq2LuolxdTZOrfVBk7rrlO8SLX-Eu4osPZEon2yJcoaS6mlrpfASIWvXm2TZ8RxaX7uBr6lTcvpyTKvgpiFnAjUYxXEPoPBOdv-s"
            target="_blank"
            rel="noreferrer"
            id="publications-all-link"
          ></a>
        </div>

        <div class="publication-list" id="publication-list"></div>
      </div>
    </section>

    <section class="section" id="project">
      <div class="container">
        <div class="section-heading reveal">
          <p class="section-kicker" id="project-kicker"></p>
          <h2 id="project-heading"></h2>
          <p class="section-lead" id="project-lead"></p>
        </div>

        <article class="project-panel reveal reveal-delay-1">
          <div class="project-main">
            <p class="project-name">celebrity-studio-for-anything</p>
            <h3 id="project-title"></h3>
            <p class="project-summary" id="project-summary"></p>
            <ul class="project-points" id="project-points"></ul>
            <a
              class="button button-primary"
              href="https://github.com/jikjn/celebrity-studio-for-anything"
              target="_blank"
              rel="noreferrer"
              id="project-link"
            ></a>
          </div>

          <div class="project-metrics" id="project-metrics"></div>
        </article>
      </div>
    </section>

    <section class="section" id="contact">
      <div class="container">
        <div class="contact-panel reveal">
          <div class="contact-copy">
            <p class="section-kicker" id="contact-kicker"></p>
            <h2 id="contact-title"></h2>
            <p class="section-lead" id="contact-lead"></p>
          </div>

          <div class="contact-actions">
            <a class="button button-primary" href="mailto:ethanwangjc@163.com" id="contact-email-link"></a>
            <a
              class="button button-secondary"
              href="https://github.com/jikjn"
              target="_blank"
              rel="noreferrer"
              id="contact-github-link"
            ></a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p id="footer-text"></p>
      <a href="#top" id="back-to-top"></a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
